name: Deploy to all servers

on:
  push:
    branches:
      - main          # deploy automatically on every push to main

  workflow_dispatch:  # also allow manual trigger from the GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install lftp
        run: sudo apt-get install -y lftp

      # ── Server 1: gambia2026.earthhouraward.org (one.com) ──────────────
      - name: Deploy → gambia2026.earthhouraward.org
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          SFTP_PATH: ${{ secrets.SFTP_PATH }}
        run: |
          lftp -u "${SFTP_USER},${SFTP_PASS}" "sftp://${SFTP_HOST}:${SFTP_PORT}" -e "
            set sftp:auto-confirm yes;
            set net:max-retries 3;
            mirror --reverse --verbose --exclude-glob .git/ --exclude-glob .github/ --exclude-glob .gitignore --exclude-glob *.example.php . ${SFTP_PATH};
            quit
          "

      # ── Server 2: gambia2026.ngocsocd.org ─────────────────────────────────
      # Deployed via cPanel Git Version Control (pull-based).
      # After pushing to main, go to:
      #   cPanel → Git Version Control → gambia2026 → Manage → Pull or Deploy → Deploy HEAD Commit
      - name: Remind → deploy gambia2026.ngocsocd.org via cPanel
        run: |
          echo "gambia2026.ngocsocd.org uses cPanel Git Version Control."
          echo "To deploy: cPanel → Git Version Control → Manage → Pull or Deploy → Deploy HEAD Commit"
