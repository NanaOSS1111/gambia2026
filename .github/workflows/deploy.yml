name: Deploy to all servers

on:
  push:
    branches:
      - main          # deploy automatically on every push to main

  workflow_dispatch:  # also allow manual trigger from the GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install lftp
        run: sudo apt-get install -y lftp

      # ── Server 1: gambia2026.earthhouraward.org (one.com) ──────────────
      - name: Deploy → gambia2026.earthhouraward.org
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          SFTP_PATH: ${{ secrets.SFTP_PATH }}
        run: |
          lftp -u "${SFTP_USER},${SFTP_PASS}" "sftp://${SFTP_HOST}:${SFTP_PORT}" -e "
            set sftp:auto-confirm yes;
            set net:max-retries 3;
            mirror --reverse --verbose --exclude-glob .git/ --exclude-glob .github/ --exclude-glob .gitignore --exclude-glob *.example.php . ${SFTP_PATH};
            quit
          "

      # ── Server 2: gambia2026.ngocsocd.org (Truehost cPanel) ──────────────
      - name: Deploy → gambia2026.ngocsocd.org
        env:
          FTP_HOST: ${{ secrets.SFTP_HOST_2 }}
          FTP_PORT: ${{ secrets.SFTP_PORT_2 }}
          FTP_USER: ${{ secrets.SFTP_USER_2 }}
          FTP_PASS: ${{ secrets.SFTP_PASS_2 }}
          FTP_PATH: ${{ secrets.SFTP_PATH_2 }}
        run: |
          lftp -u "${FTP_USER},${FTP_PASS}" "ftp://${FTP_HOST}:${FTP_PORT}" -e "
            set ftp:ssl-allow yes;
            set ssl:verify-certificate no;
            set ftp:passive-mode yes;
            set net:max-retries 3;
            set net:timeout 30;
            mirror --reverse --verbose --exclude-glob .git/ --exclude-glob .github/ --exclude-glob .gitignore --exclude-glob *.example.php --exclude db.php --exclude mail_config.php . ${FTP_PATH};
            quit
          "
