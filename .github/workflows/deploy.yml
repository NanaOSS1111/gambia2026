name: Deploy to all servers

on:
  push:
    branches:
      - main          # deploy automatically on every push to main

  workflow_dispatch:  # also allow manual trigger from the GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install lftp
        run: sudo apt-get install -y lftp

      # ── Server 1: gambia2026.earthhouraward.org (one.com) ──────────────
      - name: Deploy → gambia2026.earthhouraward.org
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          SFTP_PATH: ${{ secrets.SFTP_PATH }}
        run: |
          lftp -u "${SFTP_USER},${SFTP_PASS}" "sftp://${SFTP_HOST}:${SFTP_PORT}" -e "
            set sftp:auto-confirm yes;
            set net:max-retries 3;
            mirror --reverse --verbose --exclude-glob .git/ --exclude-glob .github/ --exclude-glob .gitignore --exclude-glob *.example.php . ${SFTP_PATH};
            quit
          "

      # ── Server 2: gambia2026.ngocsocd.org (cPanel FTP) ────────────────────
      # Secrets required in GitHub → Settings → Secrets → Actions:
      #   SFTP_HOST_2   — cPanel IP or hostname (e.g. 142.44.157.51)
      #   SFTP_PORT_2   — FTP port, usually 21
      #   SFTP_USER_2   — cPanel username
      #   SFTP_PASS_2   — cPanel password
      #   SFTP_PATH_2   — document root (e.g. /home/zvtadugw/gambia2026.ngocsocd.org)
      - name: Deploy → gambia2026.ngocsocd.org
        env:
          FTP_HOST: ${{ secrets.SFTP_HOST_2 }}
          FTP_PORT: ${{ secrets.SFTP_PORT_2 }}
          FTP_USER: ${{ secrets.SFTP_USER_2 }}
          FTP_PASS: ${{ secrets.SFTP_PASS_2 }}
          FTP_PATH: ${{ secrets.SFTP_PATH_2 }}
        run: |
          if [ -z "${FTP_HOST}" ]; then
            echo "SFTP_HOST_2 not configured — skipping deploy to gambia2026.ngocsocd.org"
            exit 0
          fi
          lftp -u "${FTP_USER},${FTP_PASS}" "ftp://${FTP_HOST}:${FTP_PORT}" -e "
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set net:max-retries 3;
            mirror --reverse --verbose --exclude-glob .git/ --exclude-glob .github/ --exclude-glob .gitignore --exclude-glob *.example.php . ${FTP_PATH};
            quit
          "
